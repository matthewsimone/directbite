<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<title>DirectBite Modifier Capture</title>
<style>
  body { width: 360px; margin: 0; padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #111827; background: #fff; font-size: 14px; }
  h1 { margin: 0 0 12px; font-size: 16px; font-weight: 700; }
  .status { display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: #f3f4f6; border-radius: 8px;
    font-size: 13px; margin-bottom: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; }
  .status.capturing .status-dot { background: #16A34A;
    box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.18); }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; font-weight: 600;
    color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; padding: 8px 10px;
    box-sizing: border-box; font: inherit; font-size: 13px;
    border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #111827; }
  .field textarea { resize: vertical; min-height: 60px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
  .field input:focus, .field textarea:focus { outline: none;
    border-color: #16A34A; box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15); }
  button { font: inherit; font-size: 13px; font-weight: 600;
    padding: 8px 12px; border: 1px solid #d1d5db; background: #fff;
    color: #111827; border-radius: 6px; cursor: pointer;
    transition: background .15s, border-color .15s; }
  button:hover { background: #f9fafb; }
  button.primary { background: #16A34A; border-color: #16A34A; color: #fff; }
  button.primary:hover { background: #15803d; border-color: #15803d; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  .row button { flex: 1; }
  .toggle-row { margin-bottom: 12px; }
  .toggle-row button { width: 100%; }
  .items { margin-top: 12px; border: 1px solid #e5e7eb; border-radius: 6px;
    max-height: 180px; overflow-y: auto; background: #fafafa; }
  .items .empty { padding: 16px; text-align: center; color: #9ca3af; font-size: 12px; }
  .items ul { margin: 0; padding: 0; list-style: none; }
  .items li { padding: 6px 12px; font-size: 12px; border-bottom: 1px solid #e5e7eb; }
  .items li:last-child { border-bottom: 0; }
  .items-header { padding: 8px 12px; font-size: 11px; font-weight: 600;
    color: #6b7280; text-transform: uppercase;
    background: #f3f4f6; border-bottom: 1px solid #e5e7eb; }
  .message { margin-top: 12px; padding: 10px 12px; border-radius: 6px; font-size: 12px; display: none; }
  .message.show { display: block; }
  .message.success { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .message.error { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
</style>
</head>
<body>
  <h1>DirectBite Modifier Capture</h1>

  <div id="status" class="status capturing">
    <span class="status-dot"></span>
    <span id="status-text">Capturing • 0 items captured</span>
  </div>

  <div class="toggle-row">
    <button id="toggle-btn">Stop Capture</button>
  </div>

  <div class="field">
    <label for="restaurant-id">Restaurant ID</label>
    <input type="text" id="restaurant-id" placeholder="uuid from DirectBite admin" />
  </div>

  <div class="field">
    <label for="bearer-token">Bearer Token</label>
    <textarea id="bearer-token" placeholder="paste session.access_token from directbite.co/admin"></textarea>
  </div>

  <div class="row">
    <button id="send-btn" class="primary">Send to DirectBite</button>
    <button id="clear-btn">Clear</button>
  </div>

  <div class="items">
    <div class="items-header" id="items-header">Captured Items</div>
    <div id="items-body">
      <div class="empty">No items captured yet</div>
    </div>
  </div>

  <div id="message" class="message"></div>

  <script src="popup.js"></script>
</body>
</html>
